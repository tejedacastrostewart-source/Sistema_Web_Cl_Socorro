<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paciente - Clínica María del Socorro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f7ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .register-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-direction: row;
        }
        .register-left {
            background-color: #e2f5f0;
            padding: 40px;
            width: 35%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .register-left h1 {
            color: #2c3e50;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        .register-left p {
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .doctor-img {
            max-width: 90%;
            height: auto;
            margin-top: 30px;
        }
        .register-right {
            padding: 45px 50px;
            width: 65%;
        }
        .logo-text {
            color: #27ae60;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: right;
            font-size: 1.1rem;
        }
        .logo-text span { color: #2c3e50; }
        .section-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #27ae60;
            font-weight: 700;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 8px;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 5px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid #dee2e6;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #5dade2;
            box-shadow: 0 0 0 3px rgba(93, 173, 226, 0.15);
        }
        .btn-register {
            background-color: #5dade2;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            margin-top: 15px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-register:hover {
            background-color: #3498db;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        .error-feedback {
            color: #e74c3c;
            font-size: 0.75rem;
            margin-top: 4px;
            font-weight: 500;
        }
        .error-alert {
            background-color: #fdf2f2;
            border: 1px solid #f8b4b4;
            color: #9b1c1c;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .extra-links a {
            text-decoration: none;
            color: #5dade2;
            font-weight: 600;
        }
        .extra-links a:hover {
            text-decoration: underline;
        }
        
        /* Responsive adjustments */
        @media (max-width: 991px) {
            .register-card {
                flex-direction: column;
                max-width: 600px;
            }
            .register-left {
                width: 100%;
                padding: 30px;
            }
            .doctor-img {
                display: none;
            }
            .register-right {
                width: 100%;
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="register-left">
            <div>
                <h1>¡HOLA!</h1>
                <p>Crea tu cuenta de paciente para poder agendar citas médicas y acceder a tu historial clínico en línea.</p>
            </div>
            <img src="https://static.vecteezy.com/system/resources/previews/025/027/366/non_2x/cartoon-character-of-female-doctor-in-uniform-or-health-care-consulting-medical-free-png.png" alt="Doctor" class="doctor-img">
        </div>

        <div class="register-right">
            <div class="logo-text">LOGO <span>Hospital</span></div>
            
            <h4 class="mb-4 fw-bold">Registro de Paciente</h4>

            <div th:if="${errorGeneral}" class="error-alert" th:text="${errorGeneral}"></div>

            <form th:action="@{/registro}" th:object="${registroDTO}" method="post">
                
                <!-- Sección 1: Datos Personales -->
                <div class="section-title">Datos Personales</div>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="nombres" class="form-label">Nombres</label>
                        <input type="text" class="form-control" id="nombres" th:field="*{nombres}" placeholder="Juan" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="apellidos" class="form-label">Apellidos</label>
                        <input type="text" class="form-control" id="apellidos" th:field="*{apellidos}" placeholder="Pérez Gómez" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="dni" class="form-label">DNI</label>
                        <input type="text" class="form-control" id="dni" th:field="*{dni}" placeholder="12345678" maxlength="8" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="fechaNacimiento" th:field="*{fechaNacimiento}" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="genero" class="form-label">Género</label>
                        <select class="form-select" id="genero" th:field="*{genero}" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                        <div class="error-feedback" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="tel" class="form-control" id="telefono" th:field="*{telefono}" placeholder="999888777" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="correo" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="correo" th:field="*{correo}" placeholder="ejemplo@correo.com" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="direccion" class="form-label">Dirección</label>
                        <input type="text" class="form-control" id="direccion" th:field="*{direccion}" placeholder="Av. Javier Prado 123" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                    </div>
                </div>

                <!-- Sección 2: Datos de Cuenta -->
                <div class="section-title">Datos de Cuenta</div>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="username" class="form-label">Nombre de Usuario (Username)</label>
                        <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="jperez123" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="********" required>
                        <div class="error-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                </div>

                <button type="submit" class="btn-register">Registrarse</button>

                <div class="extra-links">
                    <p>¿Ya tienes una cuenta? <a th:href="@{/login}">Inicia Sesión</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
