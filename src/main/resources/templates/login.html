<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Clínica María del Socorro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f7ff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            display: flex;
        }
        .login-left {
            background-color: #e0f2f1;
            padding: 40px;
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .login-left h1 {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-left p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .doctor-img {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }
        .login-right {
            padding: 60px;
            width: 50%;
        }
        .logo-text {
            color: #27ae60;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: right;
        }
        .logo-text span { color: #2c3e50; }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #34495e;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
            margin-bottom: 20px;
        }
        .btn-login {
            background-color: #5dade2;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: #3498db; }
        .error-msg {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
        }
        .extra-links a {
            text-decoration: none;
            color: #5dade2;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-left d-none d-md-flex">
            <div>
                <h1>¡HOLA!</h1>
                <p>Por favor, ingrese sus datos<br>para continuar</p>
            </div>
            <img src="https://static.vecteezy.com/system/resources/previews/025/027/366/non_2x/cartoon-character-of-female-doctor-in-uniform-or-health-care-consulting-medical-free-png.png" alt="Doctor" class="doctor-img">
        </div>

        <div class="login-right">
            <div class="logo-text">LOGO <span>Hospital</span></div>
            
            <h4 class="mb-4 fw-bold">Iniciar Sesión</h4>

            <div th:if="${param.error}" class="error-msg">
                El usuario o la contraseña son incorrectos.
            </div>

            <div th:if="${param.registrado}" class="alert alert-success" style="font-size: 0.85rem; border-radius: 10px; padding: 10px; margin-bottom: 15px;">
                ¡Registro exitoso! Por favor, inicie sesión.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario o E-mail</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="mb-3 position-relative">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>

                <div class="extra-links">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                    <p class="mt-3">¿No tienes una cuenta? <a th:href="@{/registro}">Regístrate</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
